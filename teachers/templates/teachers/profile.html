<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Profile</title>
    <!-- Optional: Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h2>Teacher Profile</h2>

        <div class="card p-3 mb-4">
            <p><strong>Username:</strong> {{ user.username }}</p>
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Role:</strong> Teacher</p>
        </div>

        <h3>Courses You Teach</h3>
        {% if courses %}
        <ul>
            {% for course in courses %}
            <li>
                {{ course.name }}
                <a href="{% url 'materials:upload_material' course.id %}" class="btn btn-sm btn-success">
                    📤 Upload Materials
                </a>
                <a href="{% url 'teachers:course_students' course.id %}" class="btn btn-sm btn-primary">
                    👩‍🎓 View Students
                </a>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>You are not teaching any courses yet.</p>
        {% endif %}
    </div>
</body>

</html>

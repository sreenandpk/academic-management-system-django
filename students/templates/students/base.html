<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f3f4f6;
        }

        /* Remove scrollbar from FullCalendar */
        .fc-scroller {
            overflow: hidden !important;
        }

        /* Prevent internal table overflow */
        .fc-scrollgrid,
        .fc-scrollgrid-section,
        .fc-daygrid-body {
            overflow: hidden !important;
        }

        /* Sidebar */
        .sidebar {
            background: #5b5fb3;
            color: white;
            min-height: 100vh;
            border-radius: 0 20px 20px 0;
        }

        .sidebar .nav-link {
            color: #fff;
            margin-bottom: 12px;
            font-weight: 500;
            padding: 10px 14px;
            transition: all 0.2s ease;
        }


        /* Active sidebar link */
        .active-link {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-weight: 600;
        }

        /* Right Panel */
        .right-panel {
            background: #E6E6FA;
            min-height: 100vh;
        }

        /* Profile Dropdown */
        .profile-box {
            position: relative;
            margin-bottom: 32px;
            display: flex;
            justify-content: flex-end;
        }

        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 16px;
            background: transparent;
            border: none;
            padding: 18px 22px;
            border-radius: 18px;
            cursor: pointer;
        }

        .profile-info {
            text-align: right;
        }

        .profile-info h6 {
            margin: 0;
            font-weight: 600;
            font-size: 15px;
            color: #111827;
        }

        .profile-info small {
            font-size: 12px;
            color: #6b7280;
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #5b5fb3;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 22px;
        }

        /* Dropdown Menu */
        .profile-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: #E6E6FA;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            width: 180px;
            display: none;
            z-index: 100;
            overflow: hidden;
        }

        .profile-menu .dropdown-item {
            padding: 12px 16px;
            font-size: 14px;
            color: #111827;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
        }

        .profile-menu .dropdown-item:hover {
            background: #E6E6FA;
        }

        .profile-box.show .profile-menu {
            display: block;
        }

        /* Calendar */
        #calendar {
            background: #E6E6FA;
            border-radius: 14px;
            padding: 10px;
        }

        .fc-toolbar-title {
            font-size: 14px !important;
            font-weight: 600;
            color: #000000 !important;
        }

        .fc-button {
            border: none !important;
            border-radius: 6px !important;
            padding: 8px 16px !important;
            font-size: 11px !important;
        }

        .fc-day-today {
            background: transparent !important;
        }

        .fc a,
        .fc a:visited,
        .fc a:hover,
        .fc a:active {
            color: #000000 !important;
            text-decoration: none !important;
        }

        .fc-daygrid-day-number {
            color: #000000 !important;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row flex-nowrap">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-4 d-none d-md-flex flex-column">
                <h4 class="mb-4">eCoursie</h4>

                <nav class="nav flex-column">

                    <!-- Dashboard -->
                    <a href="{% url 'students:dashboard' %}" class="nav-link
                       {% if request.resolver_match.url_name == 'dashboard' %}
                           active-link
                       {% endif %}">
                        Dashboard
                    </a>

                    <!-- All Courses -->
                    <a href="{% url 'courses:course_index' %}" class="nav-link
                       {% if request.resolver_match.url_name == 'course_index' %}
                           active-link
                       {% endif %}">
                        All Courses
                    </a>

                </nav>
            </div>

            <!-- Main -->
            <div class="col-md-7 p-4">
                {% block content %}
                <h3>My Courses</h3>
                {% endblock %}
            </div>

            <!-- Right Panel -->
            <div class="col-md-3 right-panel p-4 d-none d-md-block">
                {% block rightpanel %}

                <!-- PROFILE DROPDOWN -->
                <div class="profile-box">
                    <button class="profile-trigger" id="profileToggle">
                        <div class="profile-info">
                            <h6>{{ request.user.username }}</h6>
                            <small>ID: {{ request.user.id }}</small>
                        </div>
                        <div class="profile-avatar p-0 overflow-hidden">
                            {% if request.user.profile.image %}
                            <img src="{{ request.user.profile.image.url }}" alt="Profile"
                                style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
                            {% else %}
                            {{ request.user.first_name|default:request.user.username|slice:":1"|upper }}
                            {% endif %}
                        </div>

                    </button>

                    <div class="profile-menu">
                        <a href="{% url 'students:student_profile' %}" class="dropdown-item">
                            <i class="bi bi-person me-2"></i> Profile
                        </a>
                        <form method="post" action="{% url 'accounts:logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item text-danger">
                                <i class="bi bi-box-arrow-right me-2"></i> Logout
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Calendar -->
                <h6 class="mb-2">Calendar</h6>
                <div id="calendar"></div>

                {% endblock %}
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script>
        document.addEventListener("click", function (e) {
            const box = document.querySelector(".profile-box");
            const toggle = document.getElementById("profileToggle");

            if (toggle.contains(e.target)) {
                box.classList.toggle("show");
            } else {
                box.classList.remove("show");
            }
        });

        document.addEventListener('DOMContentLoaded', function () {
            const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                height: 300,
                headerToolbar: {
                    left: 'prev',
                    center: 'title',
                    right: 'next'
                },
                fixedWeekCount: false,
                showNonCurrentDates: false
            });
            calendar.render();
        });
    </script>

</body>

</html>

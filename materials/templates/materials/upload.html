<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Material</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #9094e0;
            font-family: "Segoe UI", sans-serif;
        }

        .page-wrapper {
            min-height: 100vh;
            padding: 30px 12px;
        }

        .content-card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.1);
            padding: 28px;
            max-width: 480px;
            /* smaller */
            margin: auto;
        }

        .page-title {
            font-weight: 600;
            color: #3f43a8;
            margin-bottom: 16px;
            font-size: 20px;
        }

        /* FORM INPUTS – COMPACT */
        .content-card input,
        .content-card textarea,
        .content-card select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1.4px solid #d0d4f5;
            font-size: 14px;
            background: #f9faff;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        .content-card textarea {
            min-height: 80px;
        }

        .content-card input:focus,
        .content-card textarea:focus,
        .content-card select:focus {
            outline: none;
            border-color: #5b5fb3;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(91, 95, 179, 0.15);
        }

        .content-card label {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 14px;
            color: #444;
        }

        /* BUTTONS – SMALLER */
        .btn-upload {
            background: #5b5fb3;
            border: none;
            padding: 8px 16px;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-upload:hover {
            background: #4a4ea5;
        }

        .btn-back {
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 14px;
        }

        .form-actions {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <div class="page-wrapper">
        <div class="content-card">

            <h2 class="page-title">
                Upload Material – {{ course.name }}
            </h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="form-actions">
                    <button type="submit" class="btn btn-upload">
                        📤 Upload
                    </button>

                    <a href="{% url 'teachers:dashboard' %}" class="btn btn-secondary btn-back">
                        ⬅ Back
                    </a>
                </div>
            </form>

        </div>
    </div>

</body>

</html>

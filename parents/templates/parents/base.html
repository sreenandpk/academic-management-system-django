<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
</head>

<body>
    <div style="display: flex; justify-content:space-between;">
        <span style="border: 2px solid black; padding: 10px;">profile</span>
        <span style="border: 2px solid black; padding: 10px;">children progress</span>
        <span style="border: 2px solid black; padding: 10px;">fees status</span>

        <form action="{% url 'accounts:logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="border: 2px solid black; padding: 10px; cursor:pointer; background:none;">
                logout
            </button>
        </form>
    </div>
    <div>
        {% block content %}
        {% endblock %}
    </div>
</body>

</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #9094e0;
            font-family: "Segoe UI", sans-serif;
        }

        .signup-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-card {
            background: #ffffff;
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }

        .signup-card h2 {
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #3f43a8;
        }

        /* INPUT STYLE */
        .signup-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1.5px solid #d0d4f5;
            font-size: 15px;
            background: #f9faff;
            transition: all 0.25s ease;
        }

        .signup-card input::placeholder {
            color: #a0a4d6;
        }

        .signup-card input:focus {
            outline: none;
            border-color: #5b5fb3;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(91, 95, 179, 0.15);
        }

        .signup-card label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #444;
        }

        /* BUTTON */
        .signup-card button {
            background: #5b5fb3;
            border: none;
            padding: 12px;
            border-radius: 14px;
            width: 100%;
            color: white;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .signup-card button:hover {
            background: #4a4ea5;
        }

        /* ERROR STYLE */
        .errorlist {
            color: #dc3545;
            font-size: 13px;
            margin-top: 5px;
            list-style: none;
            padding-left: 0;
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
        }

        .login-link a {
            color: #5b5fb3;
            font-weight: 500;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="signup-wrapper">
        <div class="signup-card">


            <form method="post">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <div class="mb-3">
                    <label>Username</label>
                    {{ form.username }}
                    {{ form.username.errors }}
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    {{ form.email }}
                    {{ form.email.errors }}
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    {{ form.password1 }}
                    {{ form.password1.errors }}
                </div>

                <div class="mb-3">
                    <label>Confirm Password</label>
                    {{ form.password2 }}
                    {{ form.password2.errors }}
                </div>

                <button type="submit">Sign Up</button>
            </form>

            <div class="login-link">
                Already have an account?
                <a href="{% url 'accounts:login' %}">Login</a>
            </div>

        </div>
    </div>

</body>

</html>

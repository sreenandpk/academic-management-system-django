{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #9094e0;
            font-family: "Segoe UI", sans-serif;
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }

        .login-card h2 {
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            color: #3f43a8;
        }

        .login-card p {
            text-align: center;
        }

        /* INPUT STYLE (same as signup) */
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1.5px solid #d0d4f5;
            font-size: 15px;
            background: #f9faff;
            transition: all 0.25s ease;
        }

        .login-card input::placeholder {
            color: #a0a4d6;
        }

        .login-card input:focus {
            outline: none;
            border-color: #5b5fb3;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(91, 95, 179, 0.15);
        }

        /* BUTTON */
        .login-card button {
            background: #5b5fb3;
            border: none;
            padding: 12px;
            border-radius: 14px;
            width: 100%;
            color: white;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s ease;
        }

        .login-card button:hover {
            background: #4a4ea5;
        }

        /* ERROR */
        .alert-danger {
            font-size: 14px;
        }

        .signup-link {
            text-align: center;
            margin-top: 18px;
        }

        .signup-link a {
            color: #5b5fb3;
            font-weight: 500;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <p class="text-muted mb-4">Login to continue</p>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" placeholder="Enter username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>

                {% if form.non_field_errors %}
                <div class="alert alert-danger mt-2">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                <button type="submit">Login</button>
            </form>

            <div class="signup-link">
                Don’t have an account?
                <a href="{% url 'accounts:signup' %}">Sign Up</a>
            </div>

        </div>
    </div>

</body>

</html>
